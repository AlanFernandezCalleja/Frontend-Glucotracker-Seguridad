<div class="wrap">
    <h1>Solicitudes de Cuentas Pendientes</h1>

    <input class="search" type="search" placeholder="Buscar por nombre, correo o teléfono..." [value]="q()"
        (input)="q.set($any($event.target).value)" />

    <p *ngIf="loading()" style="color: #5ab0c9; font-weight: bold;">Cargando solicitudes...</p>

    <p *ngIf="error()" style="color: red;">{{ error() }}</p>

    <div *ngIf="!loading() && solicitudesFiltradas().length === 0" style="color: #666;">
        No hay solicitudes pendientes en este momento.
    </div>

    <div class="grid" *ngIf="!loading() && solicitudesFiltradas().length > 0">
        <app-card-solicitud *ngFor="let solicitud of solicitudesFiltradas()" [solicitud]="solicitud"
            (ver)="verSolicitud(solicitud)">
        </app-card-solicitud>
    </div>
</div>
